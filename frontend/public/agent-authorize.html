<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Connect your agent — GoWarmCRM</title>
  <style>
    :root { --ember:#E8630A; --navy:#1A3A5C; --bg:#F7F5F0; --line:#E4E0D8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
           background:var(--bg); color:var(--navy); display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:32px 28px; width:100%; max-width:380px;
            box-shadow:0 6px 24px rgba(26,58,92,.08); }
    .brand { font-weight:700; font-size:20px; margin:0 0 4px; }
    .brand .warm { color:var(--ember); }
    .sub { color:#6b7785; font-size:14px; margin:0 0 22px; }
    label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
    input { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:15px; }
    input:focus { outline:none; border-color:var(--ember); }
    button { width:100%; margin-top:20px; padding:12px; background:var(--ember); color:#fff; border:none; border-radius:8px;
             font-size:15px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    .status { font-size:14px; color:#6b7785; text-align:center; padding:8px 0; }
    .err { color:#c0392b; font-size:13px; margin-top:12px; min-height:16px; }
    .spinner { width:22px; height:22px; border:3px solid var(--line); border-top-color:var(--ember); border-radius:50%;
               animation:spin .8s linear infinite; margin:8px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Go<span class="warm">Warm</span>CRM</p>
    <p class="sub">Authorize your AI agent to access your GoWarmCRM account.</p>

    <div id="working" style="display:none;">
      <div class="spinner"></div>
      <p class="status" id="workingMsg">Authorizing…</p>
    </div>

    <form id="loginForm" style="display:none;" autocomplete="on">
      <label for="email">Work email</label>
      <input id="email" type="email" required autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password" />
      <button id="submitBtn" type="submit">Sign in & authorize</button>
    </form>

    <div class="err" id="err"></div>
  </div>

  <script>
    (function () {
      var API = location.hostname.indexOf('localhost') !== -1
        ? 'http://localhost:3001/api'
        : 'https://api.gowarmcrm.com/api';

      var params = new URLSearchParams(location.search);
      var externalAuthId = params.get('external_auth_id');

      var workingEl = document.getElementById('working');
      var workingMsg = document.getElementById('workingMsg');
      var formEl = document.getElementById('loginForm');
      var errEl = document.getElementById('err');

      function showError(msg) {
        workingEl.style.display = 'none';
        errEl.textContent = msg;
      }
      function showWorking(msg) {
        errEl.textContent = '';
        formEl.style.display = 'none';
        workingMsg.textContent = msg || 'Authorizing…';
        workingEl.style.display = 'block';
      }
      function showLogin() {
        workingEl.style.display = 'none';
        formEl.style.display = 'block';
      }

      if (!externalAuthId) {
        showError('Missing authorization request. Please start the connection from your agent.');
        return;
      }

      // Complete the AuthKit flow using the signed-in user's token.
      function complete(token) {
        showWorking('Authorizing your agent…');
        return fetch(API + '/agent-auth/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ external_auth_id: externalAuthId })
        }).then(function (r) {
          if (r.status === 401 || r.status === 403) {
            // Token expired/invalid — fall back to sign-in.
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showLogin();
            return;
          }
          return r.json().then(function (data) {
            if (r.ok && data.redirect_uri) {
              window.location.href = data.redirect_uri; // hand control back to AuthKit
            } else {
              showError((data.error && data.error.message) || 'Authorization failed. Please retry from your agent.');
            }
          });
        }).catch(function () {
          showError('Network error. Please try again.');
        });
      }

      // Sign in via the existing auth endpoint, then complete.
      formEl.addEventListener('submit', function (e) {
        e.preventDefault();
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        errEl.textContent = '';
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        }).then(function (r) {
          return r.json().then(function (data) {
            if (!r.ok) throw new Error((data.error && data.error.message) || 'Sign in failed');
            localStorage.setItem('token', data.token);
            if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
            return complete(data.token);
          });
        }).catch(function (err) {
          btn.disabled = false;
          showError(err.message || 'Sign in failed');
        });
      });

      // On load: use an existing session if present, else ask to sign in.
      var existing = localStorage.getItem('token');
      if (existing) {
        complete(existing);
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
