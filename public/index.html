<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Favicon: inline SVG data URI ────────────────────────────── -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72'%3E%3Crect width='72' height='72' rx='16' fill='%23E8630A'/%3E%3Cpath d='M36 10 C28 20 16 28 18 44 C20 56 28 65 36 70 C44 65 52 56 54 44 C56 28 44 20 36 10Z' fill='%23F5A623'/%3E%3Cpath d='M36 26 C32 32 28 38 30 46 C32 52 34 57 36 60 C38 57 40 52 42 46 C44 38 40 32 36 26Z' fill='%23FDE68A'/%3E%3Cpath d='M24 46 L28 58 L33 49 L36 56 L39 49 L44 58 L48 46' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none' opacity='0.95'/%3E%3C/svg%3E"
    />

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- ── Viewport & theme ─────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E8630A" />

    <!-- ── Primary meta ─────────────────────────────────────────────── -->
    <title>GoWarm CRM</title>
    <meta
      name="description"
      content="GoWarm CRM — AI-powered sales pipeline management. Prioritised, deal-specific next actions for your entire team."
    />
    <meta name="application-name" content="GoWarm CRM" />
    <meta name="author" content="GoWarm" />

    <!-- ── Open Graph (link previews) ───────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://app.gowarmcrm.com/" />
    <meta property="og:title"       content="GoWarm CRM" />
    <meta property="og:description" content="AI-powered sales pipeline management. Prioritised, deal-specific next actions for your entire team." />
    <meta property="og:image"       content="https://app.gowarmcrm.com/og-image.png" />

    <!-- ── Twitter card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="GoWarm CRM" />
    <meta name="twitter:description" content="AI-powered sales pipeline management." />

    <!-- ── PWA manifest ─────────────────────────────────────────────── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Loading screen styles (shown before React hydrates) ──────── -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body,
      #root {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #f8f7f5;
      }

      /* Pre-hydration splash — hidden once React mounts */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #f8f7f5;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash svg {
        animation: pulse 1.8s ease-in-out infinite;
      }

      #splash .wordmark {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #1a1a2e;
        font-family: Georgia, 'Times New Roman', serif;
      }

      #splash .wordmark span.w {
        color: #e8630a;
      }

      #splash .wordmark span.c {
        color: #9ca3af;
        font-weight: 400;
        font-size: 16px;
      }

      #splash .dots {
        display: flex;
        gap: 6px;
      }

      #splash .dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #e8630a;
        opacity: 0.3;
        animation: dot 1.2s ease-in-out infinite;
      }

      #splash .dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash .dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse {
        0%, 100% { transform: scale(1);   }
        50%       { transform: scale(1.06); }
      }

      @keyframes dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
        40%            { opacity: 1;   transform: scale(1.3); }
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run GoWarm CRM.</noscript>

    <!-- Pre-hydration loading splash -->
    <div id="splash" aria-hidden="true">
      <svg width="64" height="64" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <rect width="72" height="72" rx="16" fill="#E8630A"/>
        <path d="M36 10 C28 20 16 28 18 44 C20 56 28 65 36 70 C44 65 52 56 54 44 C56 28 44 20 36 10Z" fill="#F5A623"/>
        <path d="M36 26 C32 32 28 38 30 46 C32 52 34 57 36 60 C38 57 40 52 42 46 C44 38 40 32 36 26Z" fill="#FDE68A"/>
        <path d="M24 46 L28 58 L33 49 L36 56 L39 49 L44 58 L48 46"
              stroke="white" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" fill="none" opacity="0.95"/>
      </svg>

      <div class="wordmark">
        Go<span class="w">Warm</span> <span class="c">CRM</span>
      </div>

      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Hide splash once React has painted -->
    <script>
      (function () {
        var splash = document.getElementById('splash');
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            splash.classList.add('hidden');
            setTimeout(function () { splash.remove(); }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
  </body>
</html>
